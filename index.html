<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>半日閑 — tingting.jp</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    /* 全体のレイアウト */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Noto Serif JP", "Hiragino Mincho ProN", serif;
      background-color: #faf8f5;
      color: #3a3a3a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* メインコンテナ */
    .container {
      text-align: center;
      max-width: 480px;
    }

    /* 半日閑のタイトル */
    .title-zh {
      font-size: 2.4rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      margin-bottom: 0.3rem;
      color: #2a2a2a;
    }

    /* 読み仮名 */
    .title-reading {
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      color: #999;
      margin-bottom: 2.5rem;
    }

    /* 区切り線 */
    .divider {
      width: 40px;
      height: 1px;
      background-color: #ccc;
      margin: 0 auto 2.5rem;
    }

    /* 説明文 */
    .description {
      font-size: 0.95rem;
      line-height: 2;
      color: #666;
      margin-bottom: 2.5rem;
    }

    /* Coming Soon */
    .coming-soon {
      font-family: "Noto Sans JP", sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: #bbb;
      text-transform: uppercase;
    }
  </style>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">
    <h1 class="title-zh">半日閑</h1>
    <p class="title-reading">はんにちひま</p>
    <div class="divider"></div>
    <p class="description">
      忙しい日々のなかで、半日の閑（ひま）を。<br>
      中国茶とともに、ゆるやかな時間を過ごす場所。
    </p>
    <p class="coming-soon">coming soon</p>
  </div>

</body>
</html>
